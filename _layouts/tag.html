---
layout: default
---

<main class="stack-lg">

  <header class="stack">
    <p class="meta">
      <a href="/">Maikhel</a> · <a href="/tags/">Topics</a>
    </p>

    <h1>#{{ page.tag }}</h1>

    {% if page.description %}
      <p class="meta">{{ page.description }}</p>
    {% endif %}
  </header>

  <section class="stack">
    {% assign posts = site.tags[page.tag] %}
    {% for post in posts %}
      <article>
        <h3>
          <a href="{{ post.url }}">{{ post.title }}</a>
        </h3>

        <p class="meta">
          {{ post.date | date: "%B %d, %Y" }}
        </p>
      </article>
    {% endfor %}
  </section>

</main>
