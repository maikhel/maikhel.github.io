---
layout: default
---

<main class="stack-lg">

  <header class="stack">

    <p class="meta">
      <a href="/">Maikhel</a> · <a href="/blog/">Blog</a>
    </p>

    <h1 style="view-transition-name: post-title">{{ page.title }}</h1>

    <p class="meta">
      {{ page.date | date: "%B %d, %Y" }}
    </p>

  </header>

  {% if page.image %}
    <img src="{{ page.image }}" alt="" style="max-width:100%; view-transition-name: post-image">
  {% endif %}

  {% if page.tags %}
    <p class="meta" style="margin-top: var(--space-3);">
      {% for tag in page.tags %}
        <a href="/tags/{{ tag | slugify }}/">#{{ tag }}</a>{% unless forloop.last %} · {% endunless %}
      {% endfor %}
    </p>
  {% endif %}


  <article class="stack-lg">
    {{ content }}
  </article>

</main>
